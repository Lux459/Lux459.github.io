		<script>
			window.onload = function() {
				var i1 = document.getElementById("texte1");
				var i31 = document.getElementById("texte31");
				var i32 = document.getElementById("texte32");
				var i33 = document.getElementById("texte33");
				var i4 = document.getElementById("texte4");
				var i5 = document.getElementById("texte5");
				var i6 = document.getElementById("texte6");
				i1.style.opacity = 0;
				i31.style.opacity = 0;
				i32.style.opacity = 0;
				i33.style.opacity = 0;
				i4.style.opacity = 0;
				i5.style.opacity = 0;
				i6.style.opacity = 0;
			};
			var compteurDict = {};
			compteurDict.image1 = 0;
			compteurDict.image2 = 0;
			compteurDict.image31 = 0;
			compteurDict.image32 = 0;
			compteurDict.image33 = 0;
			compteurDict.image4 = 0;
			compteurDict.image5 = 0;
			compteurDict.image6 = 0;
			
			function stepOut(levelimg1,leveltxt1,idimage,idtexte) {
				var image1 = document.getElementById(idimage);
				var texte1 = document.getElementById(idtexte);
				//document.getElementById("retourne3").innerHTML = "Out";
                image1.style.opacity = levelimg1;
				texte1.style.opacity = leveltxt1;
                if (levelimg1 > 0 || leveltxt1 < 1) {
					//document.getElementById("retourne5").innerHTML = levelimg1;
                    levelimg1 -= 0.1;
					leveltxt1 += 0.1;
                    setTimeout(stepOut, 50, levelimg1, leveltxt1, idimage, idtexte);
                }
            };
			
			function stepIn(levelimg1,leveltxt1,idimage,idtexte) {
				var image1 = document.getElementById(idimage);
				var texte1 = document.getElementById(idtexte);
                image1.style.opacity = levelimg1;
				//document.getElementById("retourne2").innerHTML = image1.style.opacity;
				//document.getElementById("retourne3").innerHTML = "In";
				texte1.style.opacity = leveltxt1;
                if (levelimg1 < 1 && leveltxt1 > 0) {
                    levelimg1 += 0.1;
					leveltxt1 -= 0.1;
                    setTimeout(stepIn, 50, levelimg1, leveltxt1, idimage, idtexte);
                }
            };
			
			function change(idimage,idtexte){
				if(compteurDict[idimage] % 2 == 0){
					//document.getElementById("retourne4").innerHTML = "outcompteur";
					//document.getElementById("retourne").innerHTML = compteurDict[idimage];
					stepOut(1,0,idimage,idtexte);
				}
				else{
					//document.getElementById("retourne4").innerHTML = "incompteur";
					//document.getElementById("retourne").innerHTML = compteurDict[idimage];
					stepIn(0,1,idimage,idtexte);
				}
				compteurDict[idimage] = compteurDict[idimage] + 1;
			}
		</script>
